<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Minimal Reader Pro</title>
    
    <!-- Використовуємо стабільну версію epub.js -->
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dexie@3/dist/dexie.min.js"></script>

    <style>
        :root { --bg: #fff; --text: #111; --accent: #007aff; }
        [data-theme="dark"] { --bg: #121212; --text: #eee; }
        
        body { 
            margin: 0; font-family: -apple-system, sans-serif; 
            background: var(--bg); color: var(--text); 
            height: 100vh; display: flex; flex-direction: column;
        }

        /* Бібліотека */
        #library { padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .book-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
            gap: 20px; 
        }
        
        .book-item { cursor: pointer; text-align: center; }
        .cover { 
            aspect-ratio: 2/3; background: #f0f0f0; border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; 
            align-items: center; justify-content: center; padding: 10px;
            font-size: 11px; margin-bottom: 8px; overflow: hidden;
        }
        [data-theme="dark"] .cover { background: #222; }

        /* Читалка */
        #reader { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100; }
        #viewer { height: 100%; overflow-y: auto; }
        
        .nav-bar { 
            position: fixed; top: 0; width: 100%; height: 50px; 
            background: var(--bg); display: flex; align-items: center; 
            padding: 0 20px; border-bottom: 1px solid #eee; z-index: 1000;
            justify-content: space-between; box-sizing: border-box;
        }
        [data-theme="dark"] .nav-bar { border-color: #333; }

        /* Утиліти */
        .loading-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); color: white;
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .btn { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">Завантаження...</div>

<div id="library">
    <header>
        <h1>Книги</h1>
        <label class="btn">
            Додати .epub <input type="file" id="file-input" accept=".epub" hidden>
        </label>
    </header>
    <div id="book-list" class="book-grid"></div>
</div>

<div id="reader">
    <div class="nav-bar" id="nav">
        <button onclick="closeBook()" style="background:none; border:none; color:var(--accent); font-size:16px;">← Назад</button>
        <button onclick="toggleDark()" style="background:none; border:none; font-size:18px;">🌓</button>
    </div>
    <div id="viewer"></div>
</div>

<script>
    const db = new Dexie("LibraryDB");
    db.version(2).stores({ books: "++id, title, data, location" });

    const fileInput = document.getElementById('file-input');
    const loading = document.getElementById('loading');
    let currentBook = null;
    let rendition = null;

    // --- ДОДАВАННЯ КНИГИ ---
    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        loading.style.display = 'flex';
        
        try {
            // Читаємо файл як ArrayBuffer (найбільш стабільний формат)
            const arrayBuffer = await file.arrayBuffer();
            
            // Спробуємо відкрити, щоб перевірити чи це валідний EPUB і взяти назву
            const book = ePub(arrayBuffer);
            let title = file.name;

            try {
                const meta = await book.loaded.metadata;
                if (meta.title) title = meta.title;
            } catch (mErr) {
                console.log("Метадані не знайдено, використовуємо назву файлу");
            }

            await db.books.add({
                title: title,
                data: arrayBuffer,
                location: null
            });

            renderLibrary();
        } catch (err) {
            console.error(err);
            alert("Помилка: " + err.message);
        } finally {
            loading.style.display = 'none';
            fileInput.value = '';
        }
    };

    // --- РЕНДЕР БІБЛІОТЕКИ ---
    async function renderLibrary() {
        const books = await db.books.toArray();
        const list = document.getElementById('book-list');
        list.innerHTML = books.map(b => `
            <div class="book-item" onclick="openBook(${b.id})">
                <div class="cover">${b.title}</div>
                <div style="font-size:12px; font-weight:600">${b.title}</div>
            </div>
        `).join('');
    }

    // --- ВІДКРИТТЯ КНИГИ ---
    async function openBook(id) {
        const bookData = await db.books.get(id);
        if (!bookData) return;

        loading.style.display = 'flex';
        document.getElementById('reader').style.display = 'block';

        try {
            if (currentBook) currentBook.destroy();
            
            currentBook = ePub(bookData.data);
            rendition = currentBook.renderTo("viewer", {
                width: "100%",
                height: "100%",
                flow: "scrolled",
                manager: "continuous"
            });

            applyTheme();

            await rendition.display(bookData.location || undefined);

            rendition.on("relocated", loc => {
                db.books.update(id, { location: loc.start.cfi });
            });

            // Ховаємо меню при кліку на текст
            rendition.on("click", () => {
                document.getElementById('nav').classList.toggle('hidden');
            });

        } catch (err) {
            console.error(err);
            alert("Не вдалося відкрити книгу: " + err.message);
            closeBook();
        } finally {
            loading.style.display = 'none';
        }
    }

    function closeBook() {
        document.getElementById('reader').style.display = 'none';
        if (rendition) rendition.destroy();
    }

    function toggleDark() {
        const body = document.body;
        const isDark = body.getAttribute('data-theme') === 'dark';
        body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        applyTheme();
    }

    function applyTheme() {
        if (!rendition) return;
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        rendition.themes.register("style", {
            body: {
                "background": isDark ? "#121212" : "#fff",
                "color": isDark ? "#eee" : "#111",
                "padding": "60px 20px !important",
                "font-family": "sans-serif !important"
            }
        });
        rendition.themes.select("style");
    }

    // Запуск
    renderLibrary();

    // Попередження про протокол
    if (window.location.protocol === 'file:') {
        alert("УВАГА: Ви відкрили файл як звичайний документ. PWA та читання книг можуть не працювати через обмеження браузера. Будь ласка, запустіть локальний сервер (наприклад, через VS Code Live Server).");
    }
</script>
</body>
</html>
